name: Build and Push Docker Image

on:
  push:
    branches:
      - main

# Forces the runner to grant permission to read secrets globally
permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Tells GitHub exactly which settings pool to draw secrets from
    environment: 
      name: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: elie0091/cs_eyana:latest
